<svg xmlns="http://www.w3.org/2000/svg" width="320" height="320" viewBox="0 0 320 320">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2A3035"/>
      <stop offset="100%" stop-color="#1A1816"/>
    </linearGradient>
  </defs>
  <rect width="320" height="320" fill="url(#g)"/>
  <!-- Grid lines -->
  <line x1="0" y1="106" x2="320" y2="106" stroke="rgba(201,184,154,0.06)" stroke-width="1"/>
  <line x1="0" y1="213" x2="320" y2="213" stroke="rgba(201,184,154,0.06)" stroke-width="1"/>
  <line x1="106" y1="0" x2="106" y2="320" stroke="rgba(201,184,154,0.06)" stroke-width="1"/>
  <line x1="213" y1="0" x2="213" y2="320" stroke="rgba(201,184,154,0.06)" stroke-width="1"/>
  <!-- Border -->
  <rect x="20" y="20" width="280" height="280" fill="none" stroke="rgba(201,184,154,0.12)" stroke-width="1"/>
  <!-- 3D cube wireframe icon -->
  <g transform="translate(160,130)" fill="none" stroke="#B56A46" stroke-width="1.2" opacity="0.6">
    <polygon points="0,-32 28,-16 28,16 0,32 -28,16 -28,-16" />
    <line x1="0" y1="-32" x2="0" y2="32"/>
    <line x1="-28" y1="-16" x2="28" y2="16"/>
    <line x1="28" y1="-16" x2="-28" y2="16"/>
  </g>
  <!-- ShapeDiver label -->
  <text x="160" y="192" font-family="monospace" font-size="9" fill="#B56A46" text-anchor="middle" opacity="0.7" letter-spacing="2">SHAPEDIVER</text>
  <!-- Model name -->
  <text x="160" y="220" font-family="Georgia, serif" font-size="17" fill="rgba(245,241,235,0.7)" text-anchor="middle">Nordnes</text>
  <text x="160" y="242" font-family="Georgia, serif" font-size="17" fill="rgba(245,241,235,0.5)" text-anchor="middle">Saltak</text>
  <!-- Play hint -->
  <text x="160" y="285" font-family="monospace" font-size="9" fill="rgba(201,184,154,0.3)" text-anchor="middle" letter-spacing="1">click to launch ▶</text>
</svg>